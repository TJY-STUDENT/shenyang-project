<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沈阳故宫游客助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'SimSun', serif;
            min-height: 100vh;
            background: url('static/1.jpg') center center / cover no-repeat fixed;
            background-position: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                135deg,
                rgba(80, 20, 20, 0.85) 0%,
                rgba(120, 40, 30, 0.75) 30%,
                rgba(100, 30, 20, 0.8) 70%,
                rgba(60, 15, 10, 0.9) 100%
            );
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .main-title {
            font-size: 4rem;
            font-weight: 700;
            color: #f5c842;
            text-shadow:
                3px 3px 6px rgba(0, 0, 0, 0.8),
                0 0 30px rgba(245, 200, 66, 0.4);
            letter-spacing: 12px;
            margin-bottom: 15px;
            position: relative;
        }

        .main-title::before,
        .main-title::after {
            content: '◆';
            font-size: 1.5rem;
            color: #d4a84b;
            margin: 0 20px;
            vertical-align: middle;
        }

        .subtitle {
            font-size: 1.4rem;
            color: #e8d5b0;
            letter-spacing: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }

        .divider {
            width: 400px;
            height: 3px;
            margin: 30px auto;
            background: linear-gradient(
                90deg,
                transparent 0%,
                #d4a84b 20%,
                #f5c842 50%,
                #d4a84b 80%,
                transparent 100%
            );
            box-shadow: 0 0 10px rgba(245, 200, 66, 0.5);
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .attraction-btn {
            padding: 18px 40px;
            font-size: 1.3rem;
            font-family: 'Noto Serif SC', serif;
            font-weight: 600;
            color: #f5c842;
            background: linear-gradient(
                180deg,
                rgba(139, 35, 35, 0.9) 0%,
                rgba(100, 25, 25, 0.95) 50%,
                rgba(80, 20, 20, 1) 100%
            );
            border: 3px solid #d4a84b;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            box-shadow:
                0 4px 15px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 0 20px rgba(212, 168, 75, 0.2);
            letter-spacing: 4px;
            min-width: 160px;
            position: relative;
            overflow: hidden;
        }

        .attraction-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(245, 200, 66, 0.2),
                transparent
            );
            transition: left 0.5s ease;
        }

        .attraction-btn:hover::before {
            left: 100%;
        }

        .attraction-btn:hover {
            transform: translateY(-3px);
            border-color: #f5c842;
            box-shadow:
                0 8px 25px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 0 30px rgba(245, 200, 66, 0.4);
            background: linear-gradient(
                180deg,
                rgba(160, 45, 40, 0.9) 0%,
                rgba(120, 30, 30, 0.95) 50%,
                rgba(100, 25, 25, 1) 100%
            );
        }

        .attraction-btn:active {
            transform: translateY(0);
        }

        .content-section {
            background: linear-gradient(
                180deg,
                rgba(60, 20, 20, 0.95) 0%,
                rgba(50, 15, 15, 0.98) 100%
            );
            border: 3px solid #d4a84b;
            border-radius: 15px;
            padding: 50px;
            margin-top: 40px;
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.5),
                inset 0 0 60px rgba(212, 168, 75, 0.05);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
            display: none;
        }

        .content-section.visible {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        .content-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 25px;
            border-bottom: 2px solid rgba(212, 168, 75, 0.4);
        }

        .content-title {
            font-size: 2.8rem;
            font-weight: 700;
            color: #f5c842;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        .content-title::before,
        .content-title::after {
            content: '❖';
            font-size: 1.2rem;
            color: #d4a84b;
            margin: 0 15px;
        }

        .images-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .content-image {
            max-width: 500px;
            width: 100%;
            height: auto;
            border-radius: 10px;
            border: 4px solid #d4a84b;
            box-shadow:
                0 8px 30px rgba(0, 0, 0, 0.4),
                0 0 20px rgba(212, 168, 75, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .content-image:hover {
            transform: scale(1.02);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(212, 168, 75, 0.3);
        }

        .description {
            background: rgba(30, 10, 10, 0.6);
            border-left: 4px solid #d4a84b;
            padding: 35px 40px;
            border-radius: 0 10px 10px 0;
            line-height: 2;
            font-size: 1.15rem;
            color: #e8d5b0;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.2);
        }

        .description p {
            margin-bottom: 20px;
            text-indent: 2em;
        }

        .description p:last-child {
            margin-bottom: 0;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            color: #a08060;
            font-size: 0.95rem;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .main-title {
                font-size: 2.5rem;
                letter-spacing: 6px;
            }

            .main-title::before,
            .main-title::after {
                display: none;
            }

            .subtitle {
                font-size: 1.1rem;
                letter-spacing: 4px;
            }

            .buttons-container {
                gap: 15px;
            }

            .attraction-btn {
                padding: 14px 28px;
                font-size: 1.1rem;
                min-width: 140px;
            }

            .content-section {
                padding: 30px 20px;
            }

            .content-title {
                font-size: 2rem;
                letter-spacing: 4px;
            }

            .content-image {
                max-width: 100%;
            }

            .description {
                padding: 25px;
                font-size: 1.05rem;
                line-height: 1.9;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">沈阳故宫</h1>
            <p class="subtitle">一宫两陵 · 世界文化遗产</p>
            <div class="divider"></div>
        </header>

        <div class="buttons-container">
            <button class="attraction-btn" data-attraction="dazheng">大政殿</button>
            <button class="attraction-btn" data-attraction="fenghuang">凤凰楼</button>
            <button class="attraction-btn" data-attraction="wensu">文溯阁</button>
            <button class="attraction-btn" data-attraction="chongzheng">崇政殿</button>
            <button class="attraction-btn" data-attraction="qingning">清宁宫</button>
        </div>

        <section class="content-section" id="content-section">
            <div class="content-header">
                <h2 class="content-title" id="content-title"></h2>
            </div>
            <div class="images-container" id="images-container"></div>
            <div class="description" id="description"></div>
        </section>

        <footer class="footer">
            <p>沈阳故宫 · 满清王朝的发祥地 · 承载着三百余年的历史记忆</p>
        </footer>
    </div>

    <script>
        const attractions = {
            "dazheng": {
                "name": "大政殿",
                "images": ["2.jpg"],
                "description": "大政殿，是沈阳故宫最宏伟的建筑，也是清太祖努尔哈赤营建的重要宫殿。这座八角重檐攒尖顶的殿宇，始建于天命十年（1625年），其独特的八角形建筑形态取自\"八旗向左\"之意，象征着满族八旗制度的根本。\n\n殿内雕梁画栋，金碧辉煌。正殿举行大典时，皇帝端坐于高台龙椅之上，八旗王公贵族分列两侧，彰显着满清王朝\"以八旗为本\"的立国理念。大政殿不仅是政治权力的象征，更是满族文化与建筑艺术完美融合的典范。\n\n在清代，大政殿见证了无数重大历史时刻：皇太极在此登基称帝，制定了入关夺取天下的宏伟战略。这里还是皇帝接见外国使节、举行盛大宴会的场所。可以说，大政殿就是满清王朝发祥地的政治心脏。"
            },
            "fenghuang": {
                "name": "凤凰楼",
                "images": ["3.jpg"],
                "description": "凤凰楼，是沈阳故宫中轴线上的标志性建筑，建造在人工堆砌的3.8米高台之上，为清宁宫的正门。这座三层歇山式建筑飞檐翘角，雕梁画栋，是当时盛京城里最高的建筑，被誉为\"凤楼三層\"，成为盛京古城的一道亮丽风景。\n\n凤凰楼不仅是皇帝后妃们观赏风光、吟诗作赋的绝佳场所，更是当年盛京城内的军事瞭望台。登楼远眺，方圆数十里的风光尽收眼底，可及时发现远处来犯之敌，具有重要的军事防御功能。\n\n楼内曾收藏了大量珍贵典籍和名家书画。每逢中秋月圆之夜，皇帝后妃便在此设宴赏月，吟诵诗词，俨然一幅宫廷风雅画卷。凤凰楼以其独特的地理位置和深厚的历史文化底蕴，成为沈阳故宫建筑群中一颗璀璨的明珠。"
            },
            "wensu": {
                "name": "文溯阁",
                "images": ["4.jpg"],
                "description": "文溯阁，是沈阳故宫中专为存放《四库全书》而建的皇家藏书楼。乾隆皇帝为了保护这部集中国古代典籍之大成的旷世巨著，特命仿照浙江宁波天一阁的形制建造此阁，寓意\"文溯\"——追本溯源，中华文脉永续不绝。\n\n整座建筑为硬山式二层楼阁，青砖灰瓦，不施彩绘，风格古朴典雅，与皇宫其他金碧辉煌的殿宇形成鲜明对比。阁内书架林立，共设书架百余个，存《四库全书》共6144函，计三万六千余册，蔚为壮观。\n\n文溯阁的建筑设计充分考虑了防火防水功能：阁前设有水池，阁基用汉白玉石砌成，整体布局严谨合理。两百多年来，《四库全书》虽历经劫难，却得以完整保存至今，成为研究中华传统文化的稀世珍宝。"
            },
            "chongzheng": {
                "name": "崇政殿",
                "images": ["5.jpg", "6.jpg"],
                "description": "崇政殿，是沈阳故宫的核心建筑，清太宗皇太极日常处理朝政、接见大臣的重要场所。这座五间九檁的硬山式殿宇，虽然规模不及北京故宫太和殿，却以其庄严肃穆的气势，体现着满清王朝定鼎中原的雄心壮志。\n\n殿内正中设有宝座屏风，雕龙刻凤，庄重大气。殿前宽阔的月台，是当年皇帝举行大典、检阅军队的场所。天聪八年（1634年），皇太极在此受贺，正式称帝，建国号\"大清\"，开启了满清入主中原的伟大征程。\n\n崇政殿还见证了清初重要的外交活动。朝鲜使节、蒙古王公、沙俄使者等纷纷在此朝拜清帝。殿内陈设的文物，如金漆赶珠龙纹屏风、鎏金铜狮等，都是不可多得的清代宫廷艺术珍品，记录着那个风云激荡的历史年代。"
            },
            "qingning": {
                "name": "清宁宫",
                "images": ["7.jpg", "8.jpg"],
                "description": "清宁宫，是沈阳故宫中保存最为完整的早期宫殿建筑，为清太祖努尔哈赤和皇后叶赫那拉氏的寝宫。这座五间硬山式建筑看似简朴，实则处处蕴含着满族传统文化的精髓。\n\n宫内最大特色是西间北端的\"万字炕\"（又称\"弯子炕\"）。这种独具满族特色的取暖设施，南西北三面相连，形如\"万\"字，体现了满族\"环宫而居\"的生活传统。冬天里，热气从灶台通过烟道加热火炕，温暖整个居室，是北方游牧民族智慧的结晶。\n\n清宁宫还是举行满族祭祀活动的神圣场所。宫门外的索伦杆（神杆）和堂子，都是满族萨满教信仰的重要遗存。每年元旦、皇帝生日等重要节日，皇帝都会在此举行隆重的祭祀仪式，祈求国泰民安、风调雨顺。清宁宫以其独特的建筑形制和深厚的文化内涵，成为研究满族宫廷生活不可替代的实物例证。"
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            const buttons = document.querySelectorAll('.attraction-btn');
            const contentSection = document.getElementById('content-section');
            const contentTitle = document.getElementById('content-title');
            const imagesContainer = document.getElementById('images-container');
            const description = document.getElementById('description');

            buttons.forEach(button => {
                button.addEventListener('click', function() {
                    const attractionId = this.getAttribute('data-attraction');
                    const attraction = attractions[attractionId];

                    contentTitle.textContent = attraction.name;

                    imagesContainer.innerHTML = '';
                    attraction.images.forEach(img => {
                        const imgElement = document.createElement('img');
                        imgElement.src = `static/${img}`;
                        imgElement.alt = attraction.name;
                        imgElement.className = 'content-image';
                        imagesContainer.appendChild(imgElement);
                    });

                    const paragraphs = attraction.description.split('\n\n');
                    description.innerHTML = paragraphs.map(p => 
                        p.trim() ? `<p>${p.trim()}</p>` : ''
                    ).join('');

                    contentSection.classList.remove('visible');
                    setTimeout(() => {
                        contentSection.classList.add('visible');
                    }, 50);

                    contentSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
                });
            });
        });
    </script>
</body>
</html>
